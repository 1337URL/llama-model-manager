<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Downloader - Home</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%); min-height: 100vh; padding: 40px 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { color: #fff; text-align: center; margin-bottom: 10px; font-size: 2.5em; }
        .subtitle { color: #888; text-align: center; margin-bottom: 40px; }
        .card { background: rgba(255,255,255,0.1); backdrop-filter: blur(10px); border-radius: 16px; padding: 30px; margin-bottom: 20px; border: 1px solid rgba(255,255,255,0.1); }
        label { display: block; color: #fff; margin-bottom: 8px; font-weight: 500; }
        input[type="text"], textarea { width: 100%; padding: 12px; border: none; border-radius: 8px; background: rgba(255,255,255,0.1); color: #fff; font-size: 16px; }
        input[type="text"]::placeholder, textarea::placeholder { color: #888; }
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: #fff; border: none; padding: 14px 28px; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: 600; width: 100%; margin-top: 10px; transition: transform 0.2s; }
        button:hover { transform: translateY(-2px); }
        button:active { transform: translateY(0); }
        #result { margin-top: 20px; }
        .result-box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 8px; margin-top: 15px; white-space: pre-wrap; font-family: 'Courier New', monospace; font-size: 14px; max-height: 400px; overflow-y: auto; }
        .error { color: #ff6b6b; }
        .success { color: #51cf66; }
        .status { text-align: center; margin-top: 10px; color: #888; }
        .info { background: rgba(89, 186, 251, 0.2); padding: 15px; border-radius: 8px; margin-top: 20px; color: #fff; }
    </style>
</head>
<body>
    <div class="container">
        <h1>URL Downloader</h1>
        <p class="subtitle">Download content from any URL securely</p>
        {% if username %}<p class="welcome">Welcome, <strong>{{ username }}</strong></p>{% endif %}

        <div class="card">
            <form id="downloadForm">
                <label for="url">URL</label>
                <input type="text" id="url" name="url" placeholder="https://example.com/page" required>

                <button type="submit" id="submitBtn">Download</button>
                <div id="loading" style="display: none; text-align: center; margin-top: 15px;">
                    <span>Loading...</span>
                </div>
            </form>
        </div>

        <div id="result"></div>
    </div>

    <script>
        document.getElementById('downloadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const url = document.getElementById('url').value;
            const btn = document.getElementById('submitBtn');
            const loading = document.getElementById('loading');
            const resultDiv = document.getElementById('result');

            // Reset result
            resultDiv.innerHTML = '';
            btn.disabled = true;
            loading.style.display = 'block';

            try {
                const response = await fetch('/api/download', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ url })
                });

                const data = await response.json();

                if (data.error) {
                    resultDiv.innerHTML = `<div class="error">Error: ${data.error}</div>`;
                } else if (data.success) {
                    resultDiv.innerHTML = `
                        <div class="success">Success! Downloaded ${data.content_length.toLocaleString()} bytes</div>
                        <div class="status">Status: ${data.status_code}</div>
                        <div class="result-box">${data.content}</div>
                        <div class="info">
                            <strong>File Saved To:</strong> ${data.saved_to}<br>
                            <strong>Filename:</strong> ${data.filename}<br>
                            <strong>Full Path:</strong> ${data.path}<br>
                            <strong>Content Type:</strong> ${data.content_type}<br>
                            <strong>Full Download:</strong> Visit this URL directly:<br>
                            <a href="${url}" target="_blank">${url}</a><br>
                            Or use the direct download endpoint:<br>
                            <code>/download/${data.filename}?url=${encodeURIComponent(url)}</code>
                        </div>
                    `;
                }
            } catch (err) {
                resultDiv.innerHTML = `<div class="error">Network error: ${err.message}</div>`;
            } finally {
                btn.disabled = false;
                loading.style.display = 'none';
            }
        });
    </script>
</body>
</html>
